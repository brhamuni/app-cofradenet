services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: cofradenet-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-cofradenet_db}
    volumes:
      - cofradenet_pgdata:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-cofradenet_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cofradenet_pgdata:

openapi: 3.1.0
info:
  title: CofradeNet API
  description: |
    API REST de la plataforma CofradeNet. Gestiona hermandades, bandas, procesiones,
    usuarios cofrades y el panel de administración de la plataforma.

    ## Autenticación
    La mayoría de los endpoints de escritura requieren un token JWT Bearer.
    Obtén el token con `POST /auth/login` e inclúyelo en la cabecera:
    `Authorization: Bearer <token>`

    ## Roles disponibles
    | Rol | Descripción |
    |-----|-------------|
    | `cofrade` | Usuario registrado. Puede seguir entidades, crear publicaciones y gestionar su perfil. |
    | `hermandad` | Administra el perfil de su hermandad y sus procesiones. |
    | `banda` | Administra el perfil de su banda y su agenda de actuaciones. |
    | `admin` | Acceso completo a la plataforma. |
  version: 1.0.0
  contact:
    name: Equipo CofradeNet

servers:
  - url: http://localhost:3000
    description: Desarrollo local

tags:
  - name: auth
    description: Autenticación y registro
  - name: usuarios
    description: Gestión de perfiles de usuario
  - name: hermandades
    description: Perfiles oficiales de hermandades y cofradías
  - name: bandas
    description: Perfiles oficiales de bandas de música
  - name: procesiones
    description: Información de procesiones, participaciones e itinerarios
  - name: seguimientos
    description: Sistema de seguimiento entre usuarios y entidades
  - name: publicaciones
    description: Publicaciones y actualizaciones de hermandades/bandas
  - name: search
    description: Búsqueda global en la plataforma
  - name: ciudades
    description: Gestión del catálogo de ciudades (solo ADMIN)
  - name: admin
    description: Panel de control de la plataforma (solo ADMIN)

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:

  # ── AUTH ──────────────────────────────────
  /auth/login:
    post:
      tags: [auth]
      summary: Iniciar sesión
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "cofrade@example.com"
              password: "secreto123"
      responses:
        '200':
          description: Login correcto. Devuelve el token JWT y datos básicos del usuario.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Error401'

  # ── USUARIOS ──────────────────────────────
  /usuarios:
    post:
      tags: [usuarios]
      summary: Registrar nuevo usuario
      operationId: registrarUsuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUsuarioRequest'
      responses:
        '201':
          description: Usuario creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          $ref: '#/components/responses/Error400'

  /usuarios/lista-completa:
    get:
      tags: [usuarios]
      summary: Listar todos los usuarios (solo ADMIN)
      operationId: listarUsuarios
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lista completa de usuarios.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'
        '403':
          $ref: '#/components/responses/Error403'

  /usuarios/{id}:
    get:
      tags: [usuarios]
      summary: Obtener perfil de usuario
      operationId: getUsuario
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Perfil del usuario.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '404':
          $ref: '#/components/responses/Error404'
    patch:
      tags: [usuarios]
      summary: Actualizar perfil propio
      operationId: actualizarUsuario
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUsuarioRequest'
      responses:
        '200':
          description: Perfil actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
    delete:
      tags: [usuarios]
      summary: Eliminar usuario
      operationId: eliminarUsuario
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Usuario eliminado.

  /usuarios/favoritos/hermandad/{id}:
    post:
      tags: [usuarios]
      summary: Añadir / quitar hermandad de favoritos (toggle)
      operationId: toggleFavoritoHermandad
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Estado de favorito actualizado.

  /usuarios/favoritos/banda/{id}:
    post:
      tags: [usuarios]
      summary: Añadir / quitar banda de favoritos (toggle)
      operationId: toggleFavoritoBanda
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Estado de favorito actualizado.

  # ── HERMANDADES ───────────────────────────
  /hermandades:
    get:
      tags: [hermandades]
      summary: Listar todas las hermandades
      operationId: listarHermandades
      security: []
      responses:
        '200':
          description: Lista de hermandades con sus datos básicos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Hermandad'
    post:
      tags: [hermandades]
      summary: Crear perfil de hermandad
      operationId: crearHermandad
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHermandadRequest'
      responses:
        '201':
          description: Hermandad creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hermandad'

  /hermandades/{id}:
    get:
      tags: [hermandades]
      summary: Obtener perfil de hermandad
      operationId: getHermandad
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Perfil completo de la hermandad.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hermandad'
        '404':
          $ref: '#/components/responses/Error404'
    patch:
      tags: [hermandades]
      summary: Editar perfil de hermandad (propietario o ADMIN)
      operationId: editarHermandad
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHermandadRequest'
      responses:
        '200':
          description: Hermandad actualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hermandad'
        '403':
          $ref: '#/components/responses/Error403'
    delete:
      tags: [hermandades]
      summary: Eliminar hermandad (solo ADMIN)
      operationId: eliminarHermandad
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Hermandad eliminada.

  /hermandades/{id}/logo:
    post:
      tags: [hermandades]
      summary: Subir escudo / logo de la hermandad
      operationId: subirLogoHermandad
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Imagen subida y ruta guardada.
        '400':
          $ref: '#/components/responses/Error400'

  /hermandades/{id}/verificar:
    patch:
      tags: [hermandades]
      summary: Verificar / desverificar hermandad (solo ADMIN)
      operationId: verificarHermandad
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                verificada:
                  type: boolean
      responses:
        '200':
          description: Estado de verificación actualizado.

  # ── BANDAS ────────────────────────────────
  /bandas:
    get:
      tags: [bandas]
      summary: Listar todas las bandas
      operationId: listarBandas
      security: []
      responses:
        '200':
          description: Lista de bandas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Banda'
    post:
      tags: [bandas]
      summary: Crear perfil de banda
      operationId: crearBanda
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBandaRequest'
      responses:
        '201':
          description: Banda creada.

  /bandas/ciudad/{id}:
    get:
      tags: [bandas]
      summary: Listar bandas de una ciudad
      operationId: bandasPorCiudad
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Bandas de la ciudad indicada.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Banda'

  /bandas/{id}:
    get:
      tags: [bandas]
      summary: Obtener perfil de banda
      operationId: getBanda
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Perfil completo de la banda con repertorio y eventos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Banda'
        '404':
          $ref: '#/components/responses/Error404'
    patch:
      tags: [bandas]
      summary: Editar perfil de banda (propietario o ADMIN)
      operationId: editarBanda
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBandaRequest'
      responses:
        '200':
          description: Banda actualizada.
        '403':
          $ref: '#/components/responses/Error403'

  /bandas/{id}/verificar:
    patch:
      tags: [bandas]
      summary: Verificar / desverificar banda (solo ADMIN)
      operationId: verificarBanda
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                estado:
                  type: boolean
      responses:
        '200':
          description: Estado de verificación actualizado.

  /bandas/{id}/eventos:
    get:
      tags: [bandas]
      summary: Obtener todos los eventos de una banda
      operationId: eventosDeUnaBanda
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Lista de eventos ordenada cronológicamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Evento'
    post:
      tags: [bandas]
      summary: Añadir evento a la agenda de la banda
      operationId: crearEvento
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventoRequest'
      responses:
        '201':
          description: Evento creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Evento'

  /bandas/{id}/eventos/{eventoId}:
    put:
      tags: [bandas]
      summary: Actualizar evento de la banda (propietario o ADMIN)
      operationId: actualizarEvento
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: eventoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventoRequest'
      responses:
        '200':
          description: Evento actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Evento'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
    delete:
      tags: [bandas]
      summary: Eliminar evento de la banda (propietario o ADMIN)
      operationId: eliminarEvento
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: eventoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Evento eliminado.
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'

  /bandas/{id}/agenda/{anio}:
    get:
      tags: [bandas]
      summary: Agenda completa de una banda para un año
      description: |
        Combina los eventos propios de la banda (conciertos, actuaciones) con las
        procesiones en las que participa ese año, ordenados cronológicamente.
      operationId: agendaAnual
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: anio
          in: path
          required: true
          schema:
            type: integer
            example: 2025
      responses:
        '200':
          description: Agenda unificada del año.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgendaItem'

  # ── PROCESIONES ───────────────────────────
  /procesiones:
    get:
      tags: [procesiones]
      summary: Listar todas las procesiones
      operationId: listarProcesiones
      security: []
      responses:
        '200':
          description: Lista de procesiones ordenada por fecha.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Procesion'
    post:
      tags: [procesiones]
      summary: Crear procesión (HERMANDAD o ADMIN)
      operationId: crearProcesion
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProcesionRequest'
      responses:
        '201':
          description: Procesión creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Procesion'
        '403':
          $ref: '#/components/responses/Error403'

  /procesiones/buscar:
    get:
      tags: [procesiones]
      summary: Buscar procesiones con filtros
      description: |
        Permite filtrar procesiones por ciudad, día de la semana, nombre, hermandad o banda.
        Al menos uno de los parámetros debe estar presente.
      operationId: buscarProcesiones
      security: []
      parameters:
        - name: ciudad
          in: query
          schema:
            type: string
          example: "Sevilla"
        - name: dia
          in: query
          schema:
            type: string
          example: "Viernes Santo"
        - name: nombre
          in: query
          schema:
            type: string
        - name: hermandad
          in: query
          schema:
            type: string
        - name: banda
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Procesiones que coinciden con los filtros.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Procesion'

  /procesiones/hermandad/{id}:
    get:
      tags: [procesiones]
      summary: Procesiones de una hermandad
      operationId: procesionesPorHermandad
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Procesiones de la hermandad indicada.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Procesion'

  /procesiones/{id}:
    get:
      tags: [procesiones]
      summary: Obtener procesión por ID
      operationId: getProcesion
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Procesión con itinerario (puntos de mapa) ordenado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Procesion'
        '404':
          $ref: '#/components/responses/Error404'
    delete:
      tags: [procesiones]
      summary: Eliminar procesión (HERMANDAD propietaria o ADMIN)
      operationId: eliminarProcesion
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Procesión eliminada.
        '403':
          $ref: '#/components/responses/Error403'

  /procesiones/{id}/ficha/{anio}:
    get:
      tags: [procesiones]
      summary: Ficha completa de una procesión para un año
      description: |
        Devuelve la procesión enriquecida con el itinerario oficial y las bandas
        participantes del año indicado.
      operationId: fichaAnual
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: anio
          in: path
          required: true
          schema:
            type: integer
            example: 2025
      responses:
        '200':
          description: Ficha anual completa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichaAnual'
        '404':
          $ref: '#/components/responses/Error404'

  /procesiones/{id}/participaciones:
    get:
      tags: [procesiones]
      summary: Listar bandas participantes en la procesión
      operationId: listarParticipaciones
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Lista de participaciones ordenada por año descendente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Participacion'
    post:
      tags: [procesiones]
      summary: Añadir banda a la procesión (HERMANDAD o ADMIN)
      operationId: addParticipacion
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateParticipacionRequest'
      responses:
        '201':
          description: Participación registrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participacion'

  /procesiones/{id}/participaciones/{pid}:
    put:
      tags: [procesiones]
      summary: Actualizar participación (HERMANDAD o ADMIN)
      operationId: updateParticipacion
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: pid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParticipacionRequest'
      responses:
        '200':
          description: Participación actualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participacion'
    delete:
      tags: [procesiones]
      summary: Eliminar participación (HERMANDAD o ADMIN)
      operationId: deleteParticipacion
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: pid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Participación eliminada.

  /procesiones/{id}/itinerario:
    get:
      tags: [procesiones]
      summary: Obtener itinerarios anuales de la procesión
      operationId: getItinerarios
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Lista de itinerarios anuales (horarios y recorrido).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Itinerario'
    post:
      tags: [procesiones]
      summary: Publicar itinerario de un año (HERMANDAD o ADMIN)
      operationId: crearItinerario
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItinerarioRequest'
      responses:
        '201':
          description: Itinerario creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Itinerario'
    put:
      tags: [procesiones]
      summary: Actualizar itinerario existente (HERMANDAD o ADMIN)
      description: El cuerpo debe incluir `itinerarioId` para identificar cuál actualizar.
      operationId: updateItinerario
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItinerarioRequest'
      responses:
        '200':
          description: Itinerario actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Itinerario'

  /procesiones/{id}/pasos:
    post:
      tags: [procesiones]
      summary: Añadir paso a la procesión (HERMANDAD o ADMIN)
      operationId: crearPaso
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePasoRequest'
      responses:
        '201':
          description: Paso creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paso'

  /procesiones/{id}/pasos/{pasoId}:
    put:
      tags: [procesiones]
      summary: Actualizar paso (HERMANDAD o ADMIN)
      operationId: updatePaso
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: pasoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasoRequest'
      responses:
        '200':
          description: Paso actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paso'
    delete:
      tags: [procesiones]
      summary: Eliminar paso (HERMANDAD o ADMIN)
      operationId: deletePaso
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: pasoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Paso eliminado.

  # ── SEGUIMIENTOS ──────────────────────────

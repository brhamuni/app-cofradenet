# ─────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtenido en `POST /auth/login`.

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Identificador numérico del recurso.

  responses:
    Error400:
      description: Solicitud incorrecta — datos de entrada inválidos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error401:
      description: No autenticado — token ausente o inválido.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error403:
      description: Sin permisos — el usuario no tiene el rol necesario.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error404:
      description: Recurso no encontrado.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    # ── Auth ──────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: cofrade@example.com
        password:
          type: string
          minLength: 6
          example: secreto123

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT válido para autenticar el resto de peticiones.
        usuario:
          type: object
          properties:
            id:
              type: integer
            nombre:
              type: string
            rol:
              $ref: '#/components/schemas/RolUsuario'

    # ── Usuarios ──────────────────────────────
    RolUsuario:
      type: string
      enum: [admin, cofrade, hermandad, banda]

    CreateUsuarioRequest:
      type: object
      required: [nombre, username, email, password]
      properties:
        nombre:
          type: string
          example: "Juan Cofrade"
        username:
          type: string
          example: "juancofrade"
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        rol:
          $ref: '#/components/schemas/RolUsuario'

    UpdateUsuarioRequest:
      type: object
      properties:
        nombre:
          type: string
        ciudadResidenciaId:
          type: integer

    Usuario:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        rol:
          $ref: '#/components/schemas/RolUsuario'
        verificado:
          type: boolean
        ciudadResidencia:
          $ref: '#/components/schemas/Ciudad'

    UsuarioAdmin:
      allOf:
        - $ref: '#/components/schemas/Usuario'
        - type: object
          properties:
            estaBloqueado:
              type: boolean

    # ── Hermandades ───────────────────────────
    CreateHermandadRequest:
      type: object
      required: [nombre, nombrePopular, titulares, templo, ciudadId]
      properties:
        nombre:
          type: string
          example: "Real Hermandad Sacramental de Nuestro Padre Jesús del Gran Poder"
        nombrePopular:
          type: string
          example: "Gran Poder"
        titulares:
          type: array
          items:
            type: string
          example: ["Señor del Gran Poder", "María Santísima del Mayor Dolor"]
        añoFundacion:
          type: integer
          example: 1431
        templo:
          type: string
          example: "Basílica de Jesús del Gran Poder"
        direccion:
          type: string
        codigoPostal:
          type: string
        diaSalida:
          type: string
          example: "Madrugada"
        descripcion:
          type: string
        ciudadId:
          type: integer

    UpdateHermandadRequest:
      type: object
      properties:
        nombre:
          type: string
        nombrePopular:
          type: string
        descripcion:
          type: string
        templo:
          type: string
        diaSalida:
          type: string

    Hermandad:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
        nombrePopular:
          type: string
        titulares:
          type: array
          items:
            type: string
        añoFundacion:
          type: integer
          nullable: true
        templo:
          type: string
        diaSalida:
          type: string
          nullable: true
        descripcion:
          type: string
          nullable: true
        imagenEscudo:
          type: string
          nullable: true
        verificada:
          type: boolean
        ciudad:
          $ref: '#/components/schemas/Ciudad'

    # ── Bandas ────────────────────────────────
    CreateBandaRequest:
      type: object
      required: [nombre, estiloMusical]
      properties:
        nombre:
          type: string
          example: "Banda de Música de la Esperanza"
        estiloMusical:
          type: string
          example: "Banda de Cornetas y Tambores"
        direccion:
          type: string
        localidad:
          type: string
        codigoPostal:
          type: string
        numeroComponentes:
          type: integer
        ciudadId:
          type: integer
        historia:
          type: string

    UpdateBandaRequest:
      type: object
      properties:
        nombre:
          type: string
        estiloMusical:
          type: string
        historia:
          type: string
        numeroComponentes:
          type: integer
        repertorioIds:
          type: array
          items:
            type: integer
          description: IDs de marchas para actualizar el repertorio completo.

    Banda:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
        estiloMusical:
          type: string
        historia:
          type: string
          nullable: true
        numeroComponentes:
          type: integer
          nullable: true
        imagenLogo:
          type: string
          nullable: true
        verificada:
          type: boolean
        ciudad:
          $ref: '#/components/schemas/Ciudad'
        repertorio:
          type: array
          items:
            $ref: '#/components/schemas/Marcha'
        eventos:
          type: array
          items:
            $ref: '#/components/schemas/Evento'

    # ── Procesiones ───────────────────────────
    CreateProcesionRequest:
      type: object
      required: [nombre, diaSemana, fecha, horaSalida, hermandadId]
      properties:
        nombre:
          type: string
          example: "Estación de Penitencia 2025"
        diaSemana:
          type: string
          example: "Madrugada"
        fecha:
          type: string
          format: date
          example: "2025-04-18"
        horaSalida:
          type: string
          example: "00:30:00"
        horaEntrada:
          type: string
          nullable: true
        hermandadId:
          type: integer

    Procesion:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
        diaSemana:
          type: string
        fecha:
          type: string
          format: date
        horaSalida:
          type: string
        horaEntrada:
          type: string
          nullable: true
        hermandad:
          $ref: '#/components/schemas/Hermandad'
        itinerario:
          type: array
          items:
            $ref: '#/components/schemas/PuntoItinerario'
          description: Puntos GPS del recorrido ordenados por `orden`.

    PuntoItinerario:
      type: object
      properties:
        id:
          type: integer
        orden:
          type: integer
        latitud:
          type: number
          format: double
        longitud:
          type: number
          format: double

    FichaAnual:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        hermandad:
          $ref: '#/components/schemas/Hermandad'
        itinerarios:
          type: array
          items:
            $ref: '#/components/schemas/Itinerario'
        participaciones:
          type: array
          items:
            $ref: '#/components/schemas/Participacion'

    # ── Participaciones ───────────────────────
    CreateParticipacionRequest:
      type: object
      required: [bandaId, anio]
      properties:
        bandaId:
          type: integer
        anio:
          type: integer
          example: 2025
        ubicacion:
          type: string
          nullable: true
          example: "Paso de Cristo"

    UpdateParticipacionRequest:
      type: object
      properties:
        anio:
          type: integer
        ubicacion:
          type: string

    Participacion:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        anio:
          type: integer
        ubicacion:
          type: string
          nullable: true
        banda:
          $ref: '#/components/schemas/Banda'

    # ── Itinerarios ───────────────────────────
    CreateItinerarioRequest:
      type: object
      required: [anio]
      properties:
        anio:
          type: integer
          example: 2025
        horarioSalida:
          type: string
          pattern: '^\d{2}:\d{2}:\d{2}$'
          example: "00:30:00"
        horarioEntrada:
          type: string
          pattern: '^\d{2}:\d{2}:\d{2}$'
          example: "08:45:00"
        recorrido:
          type: string
          example: "Iglesia → C/ Sierpes → Plaza de San Francisco → Catedral"

    UpdateItinerarioRequest:
      type: object
      required: [itinerarioId]
      properties:
        itinerarioId:
          type: integer
          description: ID del itinerario a actualizar.
        horarioSalida:
          type: string
          pattern: '^\d{2}:\d{2}:\d{2}$'
        horarioEntrada:
          type: string
          pattern: '^\d{2}:\d{2}:\d{2}$'
        recorrido:
          type: string

    Itinerario:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        anio:
          type: integer
        horarioSalida:
          type: string
          nullable: true
        horarioEntrada:
          type: string
          nullable: true
        recorrido:
          type: string
          nullable: true

    # ── Pasos ─────────────────────────────────
    CreatePasoRequest:
      type: object
      required: [nombre]
      properties:
        nombre:
          type: string
          example: "Santísimo Cristo de la Buena Muerte"
        tipo:
          type: string
          example: "Cristo"
        orden:
          type: integer
          example: 1
        descripcion:
          type: string

    UpdatePasoRequest:
      type: object
      properties:
        nombre:
          type: string
        tipo:
          type: string
        orden:
          type: integer
        descripcion:
          type: string

    Paso:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
        tipo:
          type: string
          nullable: true
        orden:
          type: integer
          nullable: true
        descripcion:
          type: string
          nullable: true

    # ── Eventos ───────────────────────────────
    CreateEventoRequest:
      type: object
      required: [titulo, fechaHora, lugar, bandaId]
      properties:
        titulo:
          type: string
          minLength: 5
          example: "Concierto de Primavera 2025"
        fechaHora:
          type: string
          format: date-time
          example: "2025-05-10T20:00:00"
        lugar:
          type: string
          example: "Auditorio Municipal de Sevilla"
        descripcion:
          type: string
          nullable: true
        tipo:
          type: string
          enum: [procesion, concierto]
          default: concierto
        bandaId:
          type: integer

    UpdateEventoRequest:
      type: object
      properties:
        titulo:
          type: string
        fechaHora:
          type: string
          format: date-time
        lugar:
          type: string
        descripcion:
          type: string
        tipo:
          type: string

    Evento:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        titulo:
          type: string
        fechaHora:
          type: string
          format: date-time
        lugar:
          type: string
        descripcion:
          type: string
          nullable: true
        tipo:
          type: string
          nullable: true
        bandaId:
          type: integer

    AgendaItem:
      type: object
      properties:
        fecha:
          type: string
          format: date-time
        tipo:
          type: string
          example: "Procesión"
        nombre:
          type: string
        lugar:
          type: string
        detalle:
          type: string
          nullable: true

    # ── Publicaciones ─────────────────────────
    CreatePublicacionRequest:
      type: object
      required: [contenido]
      properties:
        contenido:
          type: string
          example: "Este año nuestra hermandad ha incorporado a la Banda de la Macarena."
        tipo:
          type: string
          enum: [general, itinerario]
          default: general
        hermandadId:
          type: integer
          nullable: true
        bandaId:
          type: integer
          nullable: true

    Publicacion:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        contenido:
          type: string
        tipo:
          type: string
          enum: [general, itinerario]
        fechaCreacion:
          type: string
          format: date-time
          readOnly: true
        autor:
          $ref: '#/components/schemas/Usuario'
        hermandad:
          $ref: '#/components/schemas/Hermandad'
          nullable: true
        banda:
          $ref: '#/components/schemas/Banda'
          nullable: true

    # ── Seguimientos ──────────────────────────
    SeguimientoEstado:
      type: object
      properties:
        sigues:
          type: boolean
          description: Si el usuario autenticado sigue esta entidad.
        seguidores:
          type: integer
          description: Número total de seguidores.

    # ── Search ────────────────────────────────
    SearchResult:
      type: object
      properties:
        ciudades:
          type: array
          items:
            $ref: '#/components/schemas/Ciudad'
        hermandades:
          type: array
          items:
            $ref: '#/components/schemas/Hermandad'
        bandas:
          type: array
          items:
            $ref: '#/components/schemas/Banda'
        procesiones:
          type: array
          items:
            $ref: '#/components/schemas/Procesion'

    # ── Ciudades ──────────────────────────────
    CreateCiudadRequest:
      type: object
      required: [nombre, provincia, pais]
      properties:
        nombre:
          type: string
          example: "Sevilla"
        provincia:
          type: string
          example: "Sevilla"
        pais:
          type: string
          default: "España"

    UpdateCiudadRequest:
      type: object
      properties:
        nombre:
          type: string
        provincia:
          type: string
        pais:
          type: string

    Ciudad:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
        provincia:
          type: string
        pais:
          type: string

    CiudadConContadores:
      allOf:
        - $ref: '#/components/schemas/Ciudad'
        - type: object
          properties:
            numHermandades:
              type: integer
              description: Número de hermandades asociadas a esta ciudad.
            numBandas:
              type: integer
              description: Número de bandas asociadas a esta ciudad.

    # ── Marchas ───────────────────────────────
    Marcha:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        titulo:
          type: string
        compositor:
          type: string
          nullable: true

    # ── Admin ─────────────────────────────────
    Estadisticas:
      type: object
      properties:
        totalUsuarios:
          type: integer
        hermandadesVerificadas:
          type: integer
        bandasVerificadas:
          type: integer
        totalCiudades:
          type: integer

    # ── Errors ────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 404
        message:
          type: string
          example: "La procesión no existe"
        error:
          type: string
          example: "Not Found"

security:
  - BearerAuth: []
